name: Release

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for npm Trusted Publishing (no-op for token-based GH Packages)

jobs:
  ci:
    uses: agent-ix/nodejs-actions/.github/workflows/release-monorepo.yml@main
    secrets:
      NPM_REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
